<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hridi Music - YouTube Cloud Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #04020b, #09061a);
            color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .app-container {
            width: 385px; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px); border-radius: 32px; padding: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(0, 243, 255, 0.15);
            border: 1px solid rgba(255,255,255,0.07);
        }
        .header { 
            text-align: center; margin-bottom: 25px; color: #00f3ff; 
            font-weight: 800; font-size: 28px; letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.7);
        }
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        .search-box input {
            flex: 1; background: rgba(26, 26, 58, 0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 18px; border-radius: 16px; color: #fff; outline: none; font-size: 13px;
        }
        .search-box button {
            background: linear-gradient(135deg, #00f3ff, #00a8ff); border: none; padding: 0 15px;
            border-radius: 16px; cursor: pointer; font-weight: bold; color: #000; transition: 0.2s;
        }
        .search-box button:hover { transform: scale(1.03); box-shadow: 0 0 15px #00f3ff; }

        .disk-wrapper { display: flex; justify-content: center; margin-bottom: 25px; }
        .vinyl-disk {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, #222 20%, #111 21%, #333 40%, #000 41%, #111 70%, #ff007f 100%);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: transform 0.5s ease;
        }
        .vinyl-disk.spinning { animation: spin 12s linear infinite; }
        .center-hole {
            width: 40px; height: 40px; border-radius: 50%; background: #06060f;
            border: 4px solid #00f3ff; display: flex; justify-content: center; align-items: center;
            color: #00f3ff; font-size: 16px; font-weight: bold;
        }

        .track-info { text-align: center; margin-bottom: 15px; min-height: 55px; }
        .track-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .track-artist { color: #a0a5c1; font-size: 13px; }

        .timeline-box { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 11px; color: #8e92a7; }
        .progress-container { flex: 1; background: rgba(255,255,255,0.1); height: 5px; border-radius: 10px; cursor: pointer; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(to right, #00f3ff, #ff007f); border-radius: 10px; }

        .audio-effects { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(26, 26, 58, 0.4); padding: 12px; border-radius: 16px; }
        .volume-box { display: flex; align-items: center; gap: 8px; }
        .volume-box input { width: 80px; accent-color: #00f3ff; cursor: pointer; }
        .mood-select { background: #111122; color: #00f3ff; border: 1px solid rgba(0, 243, 255, 0.4); padding: 6px; border-radius: 10px; outline: none; font-size: 12px; cursor: pointer; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 25px; }
        .btn { background: none; border: none; color: #a0a5c1; font-size: 26px; cursor: pointer; transition: 0.2s; }
        .btn:hover { color: #00f3ff; }
        .btn-play { background: #fff; color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; cursor: pointer; }
        .btn-play:hover { background: #00f3ff; box-shadow: 0 0 20px #00f3ff; transform: scale(1.05); }

        .playlist-section { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; }
        .playlist-title { font-size: 14px; color: #ff007f; margin-bottom: 12px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .download-btn { background: #ff007f; border: none; padding: 6px 14px; border-radius: 10px; color: #fff; font-size: 11px; cursor: pointer; font-weight: bold; }
        .playlist-items { max-height: 100px; overflow-y: auto; list-style: none; }
        .playlist-items li { background: rgba(26, 26, 58, 0.4); padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; }
        .playlist-items li:hover { border-left: 4px solid #ff007f; background: rgba(26, 26, 58, 0.6); }

        .developer-footer {
            margin-top: 20px; font-size: 13px; color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px; font-weight: 500; text-align: center;
        }
        .developer-footer span {
            color: #00f3ff; font-weight: bold; text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        /* হিডেন ইউটিউব কন্টেইনার (এটি ব্যাকগ্রাউন্ডে অডিও প্রসেস করবে) */
        #yt-hidden-player { display: none; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">HRIDI</div>
        
        <div class="search-box">
            <!-- এখানে ইউটিউবের যেকোনো ভিডিও বা গানের লিংক পেস্ট করা যাবে -->
            <input type="text" id="searchInput" placeholder="Paste YouTube Link here...">
            <button id="searchBtn">Play Link</button>
        </div>

        <div class="disk-wrapper">
            <div class="vinyl-disk" id="disk">
                <div class="center-hole">♬</div>
            </div>
        </div>

        <div class="track-info">
            <div class="track-title" id="trackTitle">YouTube Audio Stream Engine</div>
            <div class="track-artist" id="trackArtist">Paste a link and press Play Link</div>
        </div>

        <div class="timeline-box">
            <span id="currTime">0:00</span>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span id="totalTime">0:00</span>
        </div>

        <div class="audio-effects">
            <div class="volume-box">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" step="5" value="80">
            </div>
            <div>
                <select id="moodSelect" class="mood-select">
                    <option value="flat">✨ Studio Flat</option>
                    <option value="bass">🔥 Bass Boost</option>
                    <option value="pop">🎤 Vocal Pop</option>
                </select>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="prevBtn">⏮</button>
            <button class="btn btn-play" id="playBtn">▶</button>
            <button class="btn" id="nextBtn">⏭</button>
        </div>

        <div class="playlist-section">
            <div class="playlist-title">
                <span>Saved Offline Vault Links</span>
                <button class="download-btn" id="downloadBtn">↓ Save Link</button>
            </div>
            <ul class="playlist-items" id="playlistContainer"></ul>
        </div>
    </div>

    <div class="developer-footer">Developer: <span>Parvez Dipu</span></div>

    <!-- ইউটিউব আইফ্রেম এপিআই হোল্ডার -->
    <div id="yt-hidden-player"></div>

    <script>
        // ইউটিউব এপিআই লোড করার স্ক্রিপ্ট ইন্টিগ্রেশন
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const moodSelect = document.getElementById('moodSelect');
        const downloadBtn = document.getElementById('downloadBtn');
        const playlistContainer = document.getElementById('playlistContainer');
        const disk = document.getElementById('disk');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currTimeText = document.getElementById('currTime');
        const totalTimeText = document.getElementById('totalTime');

        let isPlaying = false;
        let updateTimer;
        let currentVideoId = "36YnV9STBqc"; // ডিফল্ট স্টার্টআপ ট্র্যাক লিঙ্ক আইডি
        let offlineLinks = JSON.parse(localStorage.getItem('hridi_yt_vault')) || [];

        // ইউটিউব আইফ্রেম প্লেয়ার রেডি ফাংশন
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-hidden-player', {
                height: '0',
                width: '0',
                videoId: currentVideoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            player.setVolume(volumeSlider.value);
            updateTrackMeta();
        }

        function onPlayerStateChange(event) {
            // ১ মানে ভিডিও প্লে হচ্ছে
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                playBtn.innerText = '⏸';
                disk.classList.add('spinning');
                startProgressLoop();
                updateTrackMeta();
            } else {
                isPlaying = false;
                playBtn.innerText = '▶';
                disk.classList.remove('spinning');
                clearInterval(updateTimer);
            }
        }

        // লিঙ্ক থেকে ইউটিউব ভিডিও আইডি এক্সট্র্যাক্ট করার লজিক
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadYouTubeTrack(urlOrId) {
            let videoId = extractYouTubeId(urlOrId) || urlOrId;
            if (videoId) {
                currentVideoId = videoId;
                player.loadVideoById(videoId);
            } else {
                alert("Invalid YouTube Link! Please paste a proper watch URL.");
            }
        }

        function updateTrackMeta() {
            if (player && player.getVideoData) {
                const data = player.getVideoData();
                if(data && data.title) {
                    trackTitle.innerText = data.title;
                    trackArtist.innerText = data.author || "YouTube Artist";
                }
            }
        }

        function startProgressLoop() {
            clearInterval(updateTimer);
            updateTimer = setInterval(() => {
                if (player && player.getCurrentTime) {
                    const currentTime = player.getCurrentTime();
                    const duration = player.getDuration();
                    if (duration > 0) {
                        const progressPercent = (currentTime / duration) * 100;
                        progressBar.style.width = `${progressPercent}%`;
                        currTimeText.innerText = formatTime(currentTime);
                        totalTimeText.innerText = formatTime(duration);
                    }
                }
            }, 1000);
        }

        function formatTime(time) {
            const mins = Math.floor(time / 60); const secs = Math.floor(time % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        playBtn.addEventListener('click', () => {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        searchBtn.addEventListener('click', () => {
            if(searchInput.value.trim() !== "") {
                loadYouTubeTrack(searchInput.value.trim());
            }
        });

        searchInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && searchInput.value.trim() !== "") {
                loadYouTubeTrack(searchInput.value.trim());
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            if (player && player.setVolume) player.setVolume(e.target.value);
        });

        // কাস্টম মুড চেঞ্জার সিগন্যাল ফিল্টার
        moodSelect.addEventListener('change', (e) => {
            const container = document.querySelector('.app-container');
            if(e.target.value === 'bass') {
                container.style.boxShadow = "0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(255, 0, 127, 0.3)";
            } else if(e.target.value === 'pop') {
                container.style.boxShadow = "0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(0, 243, 255, 0.3)";
            } else {
                container.style.boxShadow = "0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(0, 243, 255, 0.15)";
            }
        });

        progressContainer.addEventListener('click', function(e) {
            if (player && player.getDuration) {
                const width = this.clientWidth;
                const clickX = e.offsetX;
                const duration = player.getDuration();
                if(duration > 0) {
                    const newTime = (clickX / width) * duration;
                    player.seekTo(newTime, true);
                }
            }
        });

        // অফলাইন লিঙ্ক সেভার ভল্ট
        downloadBtn.addEventListener('click', () => {
            if(!currentVideoId) return;
            const currentTitle = trackTitle.innerText;
            if(offlineLinks.some(s => s.id === currentVideoId)) return alert("Link already saved in vault!");

            offlineLinks.push({ id: currentVideoId, title: currentTitle });
            localStorage.setItem('hridi_yt_vault', JSON.stringify(offlineLinks));
            renderOfflinePlaylist();
        });

        function renderOfflinePlaylist() {
            playlistContainer.innerHTML = '';
            offlineLinks.forEach((item) => {
                const li = document.createElement('li');
                li.innerHTML = `<span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 230px;">🔴 ${item.title}</span> <small style="color:#00f3ff; font-weight:bold; cursor:pointer;">Play</small>`;
                li.addEventListener('click', () => {
                    loadYouTubeTrack(item.id);
                });
                playlistContainer.appendChild(li);
            });
        }

        renderOfflinePlaylist();
    </script>
</body>
</html>
